<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>モダンToDoアプリ</title>
    <!-- PWA Settings -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="/icon.svg">
    <link rel="stylesheet" href="/style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SortableJS -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
</head>

<body>
    <div class="background-shape shape-1"></div>
    <div class="background-shape shape-2"></div>
    <div class="background-shape shape-3"></div>

    <!-- ===== LOGIN OVERLAY ===== -->
    <div id="login-overlay" class="login-overlay">
        <div class="login-card">
            <h2>ログイン</h2>
            <p>タスクを管理するにはログインしてください</p>
            <div class="login-buttons">
                <button class="btn-login github" onclick="window.location.href='/api/auth/github'">
                    <i class="fab fa-github"></i> GitHubでログイン
                </button>
                <button class="btn-login google" onclick="window.location.href='/api/auth/google'">
                    <i class="fab fa-google"></i> Googleでログイン
                </button>
            </div>
        </div>
    </div>

    <!-- ===== TASKS VIEW ===== -->
    <div class="container view-container" id="tasks-view">
        <header>
            <div class="header-top">
                <h1>マイタスク</h1>
                <div class="header-actions">
                    <div id="user-info" class="user-info" style="display: none;">
                        <img id="user-avatar" src="" alt="User" class="user-avatar">
                        <span id="user-name" class="user-name"></span>
                        <button class="btn-action" id="btn-logout" title="ログアウト" aria-label="ログアウト">
                            <i class="fas fa-sign-out-alt"></i>
                        </button>
                    </div>
                    <div class="header-buttons">
                        <button class="btn-action" id="btn-theme-toggle" title="テーマ変更" aria-label="テーマ変更">
                            <i class="fas fa-sun"></i>
                        </button>
                        <button class="btn-action" id="btn-show-notifications" title="通知設定" aria-label="通知設定">
                            <i class="fas fa-bell"></i>
                        </button>
                        <button class="btn-action" id="btn-show-categories" title="カテゴリ管理" aria-label="カテゴリ管理">
                            <i class="fas fa-sliders-h"></i>
                        </button>
                    </div>
                </div>
            </div>
            <p>今後の予定を入力してください</p>

            <div class="category-tabs" id="category-tabs">
                <!-- Tabs will be rendered here via JS -->
                <span class="category-tab active" data-id="">すべて</span>
            </div>
        </header>

        <form id="add-task-form" class="add-task-form">
            <input type="text" id="task-input" placeholder="新しいタスクを追加..." required autocomplete="off">
            <select id="task-category-select" class="category-select" required>
                <!-- Options will be rendered here via JS -->
            </select>
            <div class="deadline-wrapper">
                <input type="text" class="deadline-display" placeholder="期限を選択 (任意)" readonly tabindex="-1">
                <input type="date" id="deadline-input" class="deadline-input">
            </div>
            <button type="submit" class="btn-add"><i class="fas fa-plus"></i></button>
        </form>

        <ul class="task-list" id="task-list">
            <!-- Tasks will be rendered here via JS -->
            <div class="empty-state">
                <p>読み込み中...</p>
            </div>
        </ul>
    </div>


    <!-- ===== CATEGORIES VIEW ===== -->
    <div class="container view-container" id="categories-view" style="display: none;">
        <header>
            <div class="header-top">
                <h1>カテゴリ管理</h1>
                <button class="btn-back" id="btn-back-to-tasks" title="タスクに戻る" aria-label="タスクに戻る"><i
                        class="fas fa-arrow-left"></i></button>
            </div>
            <p>タスクのカテゴリを管理します</p>
        </header>

        <div id="flash-messages" class="flash-messages"></div>

        <form id="add-category-form" class="add-task-form">
            <input type="text" id="category-input" placeholder="新しいカテゴリを追加..." required autocomplete="off">
            <button type="submit" class="btn-add"><i class="fas fa-plus"></i></button>
        </form>

        <ul class="task-list" id="category-list">
            <!-- Categories will be rendered here via JS -->
        </ul>
    </div>

    <!-- ===== NOTIFICATION SETTINGS MODAL ===== -->
    <div id="notification-modal" class="modal-overlay" style="display: none;">
        <div class="modal-card">
            <div class="modal-header">
                <h2>通知設定</h2>
                <button class="btn-close-modal" id="btn-close-notification-modal"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <p class="modal-desc">当日が期限のタスクがある場合、指定した時間に通知します。</p>
                
                <div class="settings-group">
                    <label class="switch-label">
                        <span>通知を有効にする</span>
                        <input type="checkbox" id="notification-enabled-toggle" class="toggle-switch">
                    </label>
                </div>

                <div id="notification-time-section" class="settings-group">
                    <label for="notification-time-input">通知時間:</label>
                    <input type="time" id="notification-time-input" class="time-input">
                </div>

                <div class="settings-footer">
                    <button class="btn-save-settings" id="btn-save-notification-settings">設定を保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- App Logic -->
    <script src="/app.js"></script>
</body>

</html>
